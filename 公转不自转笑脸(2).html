<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>example</title>
	<script src="https://cdn.tailwindcss.com"></script>
<style>
	@keyframes zhengzhuan {
		from {
			transform: rotate(0deg);
		}
		to {
			transform: rotate(360deg);
		}
	}
	@keyframes fanzhuan {
		from {
			transform: rotate(360deg);
		}
		to {
			transform: rotate(0deg);
		}
	}
	.a {
		animation: zhengzhuan 5s linear infinite;
		width: 200px;
		height: 10px;
		margin-left: 50px;
		border: 1px solid green;
		margin-top: 100px;
		border: 1px solid red;
	}
	
	.a span {
		display: inline-block;
		animation: fanzhuan 5s linear infinite;
	}
		@keyframes b {
		from {
			transform: rotate(0deg) translateX(50px) rotate(0deg);
		}
		to {
			transform: rotate(360deg) translateX(50px) rotate(-360deg);
		}
	}
	.b {
		animation: b 5s linear infinite;
		width: 100px;
		height: 10px;
		margin-left: 400px;
		border: 1px solid green;
		margin-top: 20px;
		border: 1px solid blue;
	}
	.b span {
		display: inline-block;
		animation: b 5s linear infinite;
	}

</style>
</head>
<body>
	<div class="a text-[15px] text-red-400">
		<span>哈</span>	
	</div>	
	<div class="b">
		<span>哈</span>
	</div>	
</body>
</html>
