<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float-xiaomi </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    ul {
    list-style: none;
}
    ul li:nth-child(1){
        width: 234px;
        height: 614px;
        float: left;
        background-color: lightblue;
        margin: 7px;
    }
    ul li:nth-child(n+2):nth-child(-n+8){
        width: 234px;
        height: 300px;
        float: left;
        background-color: lightgreen;
        margin: 7px;
    }
   ul li:nth-child(n+9):nth-child(-n+10) {
        width: 234px;
        height: 143px;
        float: left;
        background-color: lightgreen;
        margin: 7px;
    }
    ul {
        width: 1240px;
        margin: -7px;
        overflow: hidden;
        background-color: lightgray;
        }
    main {
        background-color: lightyellow;
        width: 1226px;
        overflow: hidden;
        margin: 20px auto;
    }
</style>
<body>
    <main>
       <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
       </ul>
    </main>
</body>
</html>
