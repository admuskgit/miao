<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>example</title>
	<script src="https://cdn.tailwindcss.com"></script>
<style>
	div {
		width: 150px;
		height: 150px;
		xborder: 2px solid red;
		position: relative;
		transition: 7s;
		transform-style: preserve-3d;
		margin: 100px auto;
		transform: perspective(800px);
	}
	div:hover {
		transform: perspective(800px) rotateZ(360deg) rotateX(360deg) rotateY(360deg);
	}
	span {
		width: 100px;
		height: 100px;
		border: 1px solid green;
		position: absolute;
		margin: auto;
		inset: 0;
		text-align: center;
		line-height: 100px;

	}
	span:nth-child(1) {
		xbackground-color: rgb(255, 0, 0);
		transform: rotateY(90deg) translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
	span:nth-child(2) {
		xbackground-color: rgb(0, 255, 0);
		transform: rotateY(-90deg) translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
	span:nth-child(3) {
		xbackground-color: rgb(0, 0, 255);
		transform: rotateX(90deg) translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
	span:nth-child(4) {
		xbackground-color: rgb(255, 255, 0);
		transform: rotateX(-90deg) translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
	span:nth-child(5) {
		xbackground-color: rgb(0, 255, 255);
		transform: translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
	span:nth-child(6) {
		xbackground-color: rgb(255, 0, 255);
		transform: rotateY(180deg) translateZ(50px);
		background-image: linear-gradient(to bottom right, red, yellow, green);
	}
</style>
</head>
<body>
	<div>
		<span>1</span>
		<span>2</span>
		<span>3</span>
		<span>4</span>
		<span>5</span>
		<span>6</span>
	</div>
<body>
