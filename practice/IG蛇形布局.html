<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-IG蛇形布局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        span {
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #000;
        }
        span:nth-child(12n + 1),span:nth-child(12n + 8) {
            grid-column: span 2;
            grid-row: span 2;

        }
    </style>
</head>
<body class="bg-gray-100">
 <div class="grid grid-cols-3 w-[150px] mx-auto">
    <span>1</span>
    <span>2</span>
    <span>3</span>
    <span>4</span>
    <span>5</span>
    <span>6</span> 
    <span>7</span>
    <span>8</span>
    <span>9</span>
    <span>10</span>
    <span>11</span>
    <span>12</span>
    <span>13</span>
    <span>14</span>
    <span>15</span>
    <span>16</span>
    <span>17</span>
    <span>18</span>
    <span>19</span>
    <span>20</span>
    <span>21</span>
    <span>22</span>
    <span>23</span>
    <span>24</span>
    <span>25</span>
    <span>26</span>
    <span>27</span>
 </div>
</body>
</html>
