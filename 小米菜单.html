<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>xiaomi菜单</title>
	<script src="https://cdn.tailwindcss.com"></script>
<style>
	span { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; border: 1px solid #d1d5db; font-size: 24px; width: 256px;}
</style>
</head>
<body>
	<div class="grid grid-flow-col grid-rows-[repeat(6,76px)] absolute">
		<span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span><span>14</span><span>15</span><span>16</span><span>17</span>
	</div>		
</body>
</html>
