<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>clock</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .circle {
    width: 200px;
    height: 200px;
    margin-left: 150px;
    margin-top: 20px;
    position: relative;
    border: 1px solid red;
    border-radius: 50%;
  }
  .circle span {
    position: absolute;
	/* 把span的左上角拉到父元素中心，这里的50%相对于父元素 */
    top: 50%;
    left: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    border: 1px solid green;
  }
</style>
</head>
<body>
  <div class="circle text-[20px] text-red-400">
    <span style="transform: translate(-50%,-50%) rotate(-60deg)  translateX(100px) rotate(60deg)">1</span>
    <span style="transform: translate(-50%,-50%) rotate(-30deg)  translateX(100px) rotate(30deg)">2</span>
    <span style="transform: translate(-50%,-50%) rotate(0deg)  translateX(100px) rotate(0deg)">3</span>
    <span style="transform: translate(-50%,-50%) rotate(30deg) translateX(100px) rotate(-30deg)">4</span>
    <span style="transform: translate(-50%,-50%) rotate(60deg) translateX(100px) rotate(-60deg)">5</span>
    <span style="transform: translate(-50%,-50%) rotate(90deg) translateX(100px) rotate(-90deg)">6</span>
    <span style="transform: translate(-50%,-50%) rotate(120deg) translateX(100px) rotate(-120deg)">7</span>
    <span style="transform: translate(-50%,-50%) rotate(150deg) translateX(100px) rotate(-150deg)">8</span>
    <span style="transform: translate(-50%,-50%) rotate(180deg) translateX(100px) rotate(-180deg)">9</span>
    <span style="transform: translate(-50%,-50%) rotate(210deg) translateX(100px) rotate(-210deg)">10</span>
    <span style="transform: translate(-50%,-50%) rotate(240deg) translateX(100px) rotate(-240deg)">11</span>
    <span style="transform: translate(-50%,-50%) rotate(270deg) translateX(100px) rotate(-270deg)">12</span>
  </div>
</body>
</html>
