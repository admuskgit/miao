function name(params) {

    else {return name(params - 1) + name(params - 2)}
}//斐波那契，递归，params稍微大一点就会爆栈，重复计算次数太多，递归是问题规模递减并且可终止,用循环写、
var fibs = []
function fib(n) {
  if (fibs[n]) return fibs[n]
  if (n < 3) {
    fibs[n] = 1
  } else {
    fibs[n] = fib(n - 1) + fib(n - 2)
  }
  return fibs[n]
}

<script id="narcissistic">
function digitWidth(n) {
  var width = 0
   do {
    var ge = n % 10
    n= (n - ge) / 10
    width++
  } while (n > 0) //换成do while,是为了n=0的特殊情况,
  return width
}
function narcissistic(n) {
  var width = digitWidth(n)
  var sum = 0
  var m = n
  while (n > 0) {
    var ge = n % 10
    n= (n - ge) / 10
    sum += ge ** width
  }
  if (sum == m) {
    return true
  } else {
    return false
  }
}
var a = Number(prompt('请输入A'))
if (narcissistic(a)) {
  console.log("YES")
}
else {
  console.log("NO")
}
</script>

<script id="complete-number">
function completenumber(n) {
  var sum = 1
  for (var i = 2 ; i <= Math.sqrt(n) ; i++) {
    if (n % i == 0) {
      sum += i
      if (i != n / i) {
      sum += n / i
    }
    }
    
  }
  if (sum == n) {
    return true
  } else {
    return false
  }
}
var a = Number(prompt('请输入A'))
console.log(completenumber(a) ? "YES" : "NO")
</script>

<script id="palindrom">
function palindrom(n) {
  var a = n
  var reverse = 0
  while (n > 0) {
    var ge = n % 10
    reverse = reverse * 10 + ge
    n = (n - ge) / 10
  }
  if (reverse == a) {
    return true
  } else {
    return false
  }
}
var a = Number(prompt('请输入A'))
if (palindrom(a)) {
  console.log("YES")
}
else {
  console.log("NO")
}
</script>

<script id="itob">

  if (n < 0) {
    n = -n
  }
  if (n > 0) {

  else {

  }
}

<script id="sqrt">
var n = +prompt('请输入A')//核心逻辑：总面积不变，长矩形变方块，长边越来越短，短边越来越长
var x = n//总面积，也是初始长边
var y = 1//初始短边
while (x > y) {
  x = (x + y) / 2//长边变短
  y = n / x//短边变长，总面积依然不变，除以新的长边拿到新的短边，二者互相靠近。
} 
console.log(x.toFixed(3))
</script>

<script id="sqrt2">
  function sqrt(n) {//牛顿法
    var x = n
    for (var i = 0; i < 10; i++) {
      x = x * 0.5 + n / x * 0.5
    }
    return x
  }
</script>
